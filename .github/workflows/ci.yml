name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          # arm64 Linux is a published release target, so it gets built here
          # too rather than only being exercised at tag time.
          - os: ubuntu-24.04-arm
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux system deps (X11/evdev headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxi-dev libevdev-dev libxdo-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --workspace
      - run: cargo test --workspace

  # The protocol + transport layers stay pure Rust so mobile shells can embed
  # them; this job keeps that guarantee honest.
  mobile-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build proto crate for Android
        run: cargo ndk -t arm64-v8a build -p mousefinity-proto --release
