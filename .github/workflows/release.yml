name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # arm64 servers (Ampere, Graviton). A native arm runner avoids
          # cross-linking the X11/evdev libraries the capture backend needs.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Linux system deps (X11/evdev headers)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxi-dev libevdev-dev libxdo-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p mousefinity
      - name: Build relay server (iroh-relay)
        run: cargo install iroh-relay@1.0.2 --features server --target ${{ matrix.target }} --root relay-stage
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          staging=mousefinity-${{ github.ref_name }}-${{ matrix.target }}
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/mousefinity README.md LICENSE-MIT LICENSE-APACHE "$staging/"
          tar czf "$staging.tar.gz" "$staging"
          relaystaging=mousefinity-relay-${{ github.ref_name }}-${{ matrix.target }}
          mkdir "$relaystaging"
          cp relay-stage/bin/iroh-relay relay/relay.example.toml relay/iroh-relay.service README.md "$relaystaging/"
          tar czf "$relaystaging.tar.gz" "$relaystaging"
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = "mousefinity-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory $staging | Out-Null
          Copy-Item target/${{ matrix.target }}/release/mousefinity.exe, README.md, LICENSE-MIT, LICENSE-APACHE $staging/
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          $relayStaging = "mousefinity-relay-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory $relayStaging | Out-Null
          Copy-Item relay-stage/bin/iroh-relay.exe, relay/relay.example.toml, README.md $relayStaging/
          Compress-Archive -Path $relayStaging -DestinationPath "$relayStaging.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: mousefinity-${{ matrix.target }}
          path: |
            mousefinity-${{ github.ref_name }}-${{ matrix.target }}.*
            mousefinity-relay-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error

  # A CycloneDX SBOM ships with every release so downstream users can scan
  # what they are actually running. Generated from Cargo.lock, so it describes
  # the exact dependency set the binaries were built from.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: |
          cargo cyclonedx --format json --spec-version 1.5 --all-features
          mkdir -p sbom
          # One SBOM per crate, emitted next to each manifest.
          cp crates/mousefinity/mousefinity.cdx.json \
             "sbom/mousefinity-${{ github.ref_name }}.cdx.json"
          cp crates/proto/mousefinity-proto.cdx.json \
             "sbom/mousefinity-proto-${{ github.ref_name }}.cdx.json"
          python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d['bomFormat'], d['specVersion'], len(d['components']), 'components')" \
             "sbom/mousefinity-${{ github.ref_name }}.cdx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/*.cdx.json
          if-no-files-found: error

  release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # `mousefinity upgrade` refuses to install a release without these: a
      # self-updater executes what it downloads, so it verifies the bytes
      # against the workflow's own digest rather than trusting the transport.
      - name: Publish checksums
        run: |
          cd dist
          shasum -a 256 mousefinity-* > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
